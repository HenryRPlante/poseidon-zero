<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Analysis</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <div class="sensor-detect-strip">
    <ion-chip [color]="devices.length > 0 ? 'success' : 'medium'">
      <ion-label>{{ sensorDetectionText }}</ion-label>
    </ion-chip>
  </div>

  <!-- Trial Selection -->
  <ion-card *ngIf="trials.length > 0">
    <ion-card-header>
      <ion-card-title>Select Trial for Analysis</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-select [(ngModel)]="selectedTrial" (ionChange)="selectTrial($event.detail.value)">
        <ion-select-option *ngFor="let trial of trials" [value]="trial">
          {{ trial.trialName }} - {{ trial.startTime | date: 'short' }}
        </ion-select-option>
      </ion-select>
    </ion-card-content>
  </ion-card>

  <!-- Live Sensor Trends - Line Charts Only -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Sensor Trends</ion-card-title>
      <ion-card-subtitle *ngIf="chartReadingsHistory.length > 0">Showing {{ chartReadingsHistory.length }} readings</ion-card-subtitle>
    </ion-card-header>
  </ion-card>

  <!-- Temperature Chart - Full Row -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Temperature</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <app-sensor-chart 
        [readings]="chartReadingsHistory"
        [chartType]="'temperature'"
        [showOptimalRange]="true">
      </app-sensor-chart>
    </ion-card-content>
  </ion-card>

  <!-- TDS Chart - Full Row -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>TDS (Total Dissolved Solids)</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <app-sensor-chart 
        [readings]="chartReadingsHistory"
        [chartType]="'tds'"
        [showOptimalRange]="true">
      </app-sensor-chart>
    </ion-card-content>
  </ion-card>

  <!-- pH Chart - Full Row -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>pH Level</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <app-sensor-chart 
        [readings]="chartReadingsHistory"
        [chartType]="'ph'"
        [showOptimalRange]="true">
      </app-sensor-chart>
    </ion-card-content>
  </ion-card>

  <!-- EC Chart - Full Row -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>EC (Electrical Conductivity)</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <app-sensor-chart 
        [readings]="chartReadingsHistory"
        [chartType]="'ec'"
        [showOptimalRange]="true">
      </app-sensor-chart>
    </ion-card-content>
  </ion-card>

</ion-content>
